        :root {
            --primary: #0F172A;
            --secondary: #334155;
            --cta: #0369A1;
            --background: #F8FAFC;
            --text: #020617;
            --accent: #0EA5E9;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
        }
        
        * {
            font-family: 'Lato', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'EB Garamond', serif;
        }
        
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .nav-link {
            position: relative;
            transition: color 0.2s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Layout */
        #map {
            width: calc(100% - 320px);
            height: calc(100vh - 64px);
            position: absolute;
            top: 64px;
            left: 0;
        }
        
        .sidebar {
            width: 320px;
            height: calc(100vh - 64px);
            position: absolute;
            top: 64px;
            right: 0;
            overflow-y: auto;
        }
        
        /* Tool buttons */
        .tool-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .tool-btn:hover {
            background: rgba(14, 165, 233, 0.15);
            border-color: var(--accent);
        }
        
        .tool-btn.active {
            background: rgba(14, 165, 233, 0.25);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.3);
        }
        
        /* Result panel */
        .result-card {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
        }
        
        /* OL overrides */
        .ol-zoom button,
        .ol-rotate button {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #fff !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
        
        .ol-control {
            background: transparent !important;
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-field:focus {
            border-color: var(--accent);
        }
        
        .input-field::placeholder {
            color: #6B7280;
        }
    </style>

            <button class="tool-btn w-full p-3 rounded-lg border border-gray-700 text-left flex items-center space-x-3" data-tool="path" onclick="selectTool(&#39;path&#39;)">
                <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
                <div>
                    <div class="font-medium text-sm">路径模拟</div>
                    <div class="text-xs text-gray-400">避险逃生路线规划</div>
                </div>
            </button>
            
            <button class="tool-btn w-full p-3 rounded-lg border border-gray-700 text-left flex items-center space-x-3" data-tool="clear" onclick="clearAnalysis()">
                <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
                <div>
                    <div class="font-medium text-sm">清除分析</div>
                    <div class="text-xs text-gray-400">重置所有分析结果</div>
                </div>
            </button>
        </div>
        
        <!-- Buffer Tool Panel -->
        <div id="bufferPanel" class="tool-panel space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">缓冲距离 (米)</label>
                <input type="number" id="bufferDistance" value="500" min="10" max="10000" class="input-field w-full">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">选择要素</label>
                <select id="bufferTarget" class="input-field w-full">
                    <option value="sensor">传感器点位</option>
                    <option value="building">建筑轮廓</option>
                    <option value="risk">风险区域</option>
                </select>
            </div>
            
            <button class="w-full px-4 py-2 bg-sky-600 hover:bg-sky-500 rounded text-sm cursor-pointer transition-colors duration-200" onclick="runBufferAnalysis()">
                执行缓冲区分析
            </button>
            
            <div class="text-xs text-gray-400 bg-gray-800/50 rounded p-3">
                <p>操作说明：</p>
                <ol class="list-decimal list-inside mt-1 space-y-1">
                    <li>设置缓冲距离</li>
                    <li>选择目标要素类型</li>
                    <li>在地图上点击要素</li>
                    <li>查看生成的缓冲区</li>
                </ol>
            </div>
        </div>
        
        <!-- Overlay Tool Panel -->
        <div id="overlayPanel" class="tool-panel space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">第一图层</label>
                <select id="overlayLayer1" class="input-field w-full">
                    <option value="risk">风险等级区划</option>
                    <option value="population">人口密度</option>
                    <option value="building">建筑分布</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">第二图层</label>
                <select id="overlayLayer2" class="input-field w-full">
                    <option value="population">人口密度</option>
                    <option value="risk">风险等级区划</option>
                    <option value="infrastructure">基础设施</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">分析类型</label>
                <select id="overlayType" class="input-field w-full">
                    <option value="intersect">交集 (Intersect)</option>
                    <option value="union">并集 (Union)</option>
                    <option value="difference">差集 (Difference)</option>
                </select>
            </div>
            
            <button class="w-full px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm cursor-pointer transition-colors duration-200" onclick="runOverlayAnalysis()">
                执行叠加分析
            </button>
        </div>
        
        <!-- Path Tool Panel -->
        <div id="pathPanel" class="tool-panel space-y-4 hidden">
            <div class="text-xs text-gray-400 bg-gray-800/50 rounded p-3">
                <p>操作说明：</p>
                <ol class="list-decimal list-inside mt-1 space-y-1">
                    <li>点击地图设置起点</li>
                    <li>点击地图设置终点</li>
                    <li>自动避开高风险区</li>
                    <li>生成最优逃生路径</li>
                </ol>
            </div>
            
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-300">起点状态:</span>
                <span id="startPointStatus" class="text-xs px-2 py-1 rounded bg-gray-700">未设置</span>
            </div>
            
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-300">终点状态:</span>
                <span id="endPointStatus" class="text-xs px-2 py-1 rounded bg-gray-700">未设置</span>
            </div>
            
            <button class="w-full px-4 py-2 bg-green-600 hover:bg-green-500 rounded text-sm cursor-pointer transition-colors duration-200" onclick="calculatePath()">
                计算路径
            </button>
            
            <button class="w-full px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm cursor-pointer transition-colors duration-200" onclick="resetPathPoints()">
                重置端点
            </button>
        </div>
        
        <!-- Analysis Results -->
        <div id="resultsPanel" class="mt-6 pt-6 border-t border-gray-700">
            <h3 class="text-sm font-semibold mb-3 text-gray-300">分析结果</h3>
            <div id="resultsContent" class="space-y-3">
                <div class="text-center text-gray-500 text-sm py-8">
                    暂无分析结果
                </div>
            </div>
        </div>
        
        <!-- Analysis Log -->
        <div class="mt-6 pt-6 border-t border-gray-700">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold text-gray-300">研判日志</h3>
                <button class="text-xs text-sky-400 hover:text-sky-300 cursor-pointer" onclick="viewLogs()">查看全部</button>
            </div>
            <div id="logList" class="space-y-2"><div class="text-center text-gray-500 text-xs py-4">暂无日志记录</div></div>
        </div>
    </div>

    <script>
        // Map and layers
        let map;
        let analysisLayer;
        let tempLayer;
        let pathPoints = { start: null, end: null };
        let currentTool = 'buffer';
        
        // Mianyang center
        const MIANYANG_CENTER = ol.proj.fromLonLat([104.7468, 31.4677]);
        
        // Initialize map
        function initMap() {
            // Base layer
            const baseLayer = new ol.layer.Tile({
                source: new ol.source.OSM({
                    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                })
            });
            
            // Risk zones (mock)
            const riskSource = new ol.source.Vector();
            for (let i = 0; i < 15; i++) {
                const coords = [
                    MIANYANG_CENTER[0] + (Math.random() - 0.5) * 40000,
                    MIANYANG_CENTER[1] + (Math.random() - 0.5) * 40000
                ];
                const polygon = createRandomPolygon(coords, 3000 + Math.random() * 5000);
                const feature = new ol.Feature({
                    geometry: new ol.geom.Polygon([polygon]),
                    riskLevel: ['low', 'medium', 'high'][Math.floor(Math.random() * 3)]
                });
                riskSource.addFeature(feature);
            }
            
            const riskLayer = new ol.layer.Vector({
                source: riskSource,
                style: function(feature) {
                    const level = feature.get('riskLevel');
                    const color = level === 'high' ? 'rgba(239, 68, 68, 0.5)' : 
                                 level === 'medium' ? 'rgba(245, 158, 11, 0.5)' : 'rgba(16, 185, 129, 0.5)';
                    return new ol.style.Style({
                        fill: new ol.style.Fill({ color: color }),
                        stroke: new ol.style.Stroke({ color: '#fff', width: 1 })
                    });
                }
            });
            
            // Sensor points
            const sensorSource = new ol.source.Vector();
            for (let i = 0; i < 30; i++) {
                const coords = [
                    MIANYANG_CENTER[0] + (Math.random() - 0.5) * 35000,
                    MIANYANG_CENTER[1] + (Math.random() - 0.5) * 35000
                ];
                const feature = new ol.Feature({
                    geometry: new ol.geom.Point(coords),
                    type: 'sensor',
                    id: 'S' + String(i + 1).padStart(4, '0')
                });
                sensorSource.addFeature(feature);
            }
            
            const sensorLayer = new ol.layer.Vector({
                source: sensorSource,
                style: new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 6,
                        fill: new ol.style.Fill({ color: '#0EA5E9' }),
                        stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
                    })
                })
            });
            
            // Analysis result layer
            analysisLayer = new ol.layer.Vector({
                source: new ol.source.Vector(),
                style: new ol.style.Style({
                    fill: new ol.style.Fill({ color: 'rgba(14, 165, 233, 0.4)' }),
                    stroke: new ol.style.Stroke({ color: '#0EA5E9', width: 2 })
                })
            });
            
            // Temporary layer for drawing
            tempLayer = new ol.layer.Vector({
                source: new ol.source.Vector()
            });
            
            map = new ol.Map({
                target: 'map',
                layers: [baseLayer, riskLayer, sensorLayer, analysisLayer, tempLayer],
                view: new ol.View({
                    center: MIANYANG_CENTER,
                    zoom: 12
                })
            });
            
            // Click handler for tools
            map.on('click', handleMapClick);
            
            // Load logs
            loadLogs();
        }
        
        // Create random polygon
        function createRandomPolygon(center, radius) {
            const points = [];
            const numPoints = 6 + Math.floor(Math.random() * 4);
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * 2 * Math.PI;
                const r = radius * (0.7 + Math.random() * 0.3);
                points.push([center[0] + r * Math.cos(angle), center[1] + r * Math.sin(angle)]);
            }
            points.push(points[0]);
            return points;
        }
        
        // Select tool
        function selectTool(tool) {
            currentTool = tool;
            
            // Update UI
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
            
            // Show/hide panels
            document.querySelectorAll('.tool-panel').forEach(panel => {
                panel.classList.add('hidden');
            });
            
            if (tool === 'buffer') {
                document.getElementById('bufferPanel').classList.remove('hidden');
            } else if (tool === 'overlay') {
                document.getElementById('overlayPanel').classList.remove('hidden');
            } else if (tool === 'path') {
                document.getElementById('pathPanel').classList.remove('hidden');
            }
            
            // Clear temp layer
            tempLayer.getSource().clear();
        }
        
        // Handle map click
        function handleMapClick(evt) {
            if (currentTool === 'buffer') {
                const feature = map.forEachFeatureAtPixel(evt.pixel, f => f);
                if (feature) {
                    runBufferOnFeature(feature);
                }
            } else if (currentTool === 'path') {
                if (!pathPoints.start) {
                    pathPoints.start = evt.coordinate;
                    updatePathUI();
                } else if (!pathPoints.end) {
                    pathPoints.end = evt.coordinate;
                    updatePathUI();
                }
            }
        }
        
        // Run buffer analysis on clicked feature
        function runBufferOnFeature(feature) {
            const distance = parseFloat(document.getElementById('bufferDistance').value) || 500;
            const geom = feature.getGeometry();
            
            // Convert to GeoJSON for Turf
            const geojson = JSON.parse(new ol.format.GeoJSON().writeGeometry(geom));
            const buffered = turf.buffer(geojson, distance / 1000, { units: 'kilometers' });
            
            // Add to analysis layer
            const olGeom = new ol.format.GeoJSON().readGeometry(buffered);
            const resultFeature = new ol.Feature({
                geometry: olGeom,
                type: 'buffer',
                distance: distance
            });
            
            analysisLayer.getSource().clear();
            analysisLayer.getSource().addFeature(resultFeature);
            
            // Add result
            addResult({
                type: 'buffer',
                description: `缓冲区分析：${distance}米`,
                area: (turf.area(buffered) / 1000000).toFixed(2),
                timestamp: new Date().toLocaleTimeString('zh-CN')
            });
            
            // Log it
            addLog('缓冲区分析', `${distance}米缓冲区`);
        }
        
        // Run buffer analysis (button click)
        function runBufferAnalysis() {
            showToast('请在地图上点击要分析的要素');
        }
        
        // Run overlay analysis
        function runOverlayAnalysis() {
            const layer1 = document.getElementById('overlayLayer1').value;
            const layer2 = document.getElementById('overlayLayer2').value;
            const type = document.getElementById('overlayType').value;
            
            // Mock overlay result
            const mockPolygon = createRandomPolygon(MIANYANG_CENTER, 8000);
            const geom = new ol.geom.Polygon([mockPolygon]);
            
            const resultFeature = new ol.Feature({
                geometry: geom,
                type: 'overlay',
                layer1: layer1,
                layer2: layer2,
                operation: type
            });
            
            analysisLayer.getSource().clear();
            analysisLayer.getSource().addFeature(resultFeature);
            
            // Calculate mock area
            const geojson = JSON.parse(new ol.format.GeoJSON().writeGeometry(geom));
            const area = (turf.area(geojson) / 1000000).toFixed(2);
            
            addResult({
                type: 'overlay',
                description: `叠加分析：${layer1} ∩ ${layer2}`,
                operation: type,
                area: area,
                timestamp: new Date().toLocaleTimeString('zh-CN')
            });
            
            addLog('叠加分析', `${layer1} + ${layer2} - ${type}`);
            showToast('叠加分析完成');
        }
        
        // Update path UI
        function updatePathUI() {
            document.getElementById('startPointStatus').textContent = pathPoints.start ? '已设置' : '未设置';
            document.getElementById('startPointStatus').className = pathPoints.start ? 
                'text-xs px-2 py-1 rounded bg-green-600' : 'text-xs px-2 py-1 rounded bg-gray-700';
            
            document.getElementById('endPointStatus').textContent = pathPoints.end ? '已设置' : '未设置';
            document.getElementById('endPointStatus').className = pathPoints.end ? 
                'text-xs px-2 py-1 rounded bg-green-600' : 'text-xs px-2 py-1 rounded bg-gray-700';
            
            // Draw points
            tempLayer.getSource().clear();
            if (pathPoints.start) {
                tempLayer.getSource().addFeature(new ol.Feature({
                    geometry: new ol.geom.Point(pathPoints.start),
                    type: 'start'
                }));
            }
            if (pathPoints.end) {
                tempLayer.getSource().addFeature(new ol.Feature({
                    geometry: new ol.geom.Point(pathPoints.end),
                    type: 'end'
                }));
            }
        }
        
        // Calculate path
        function calculatePath() {
            if (!pathPoints.start || !pathPoints.end) {
                showToast('请先设置起点和终点');
                return;
            }
            
            // Mock path calculation (avoiding high risk areas)
            const midX = (pathPoints.start[0] + pathPoints.end[0]) / 2;
            const midY = (pathPoints.start[1] + pathPoints.end[1]) / 2;
            
            // Create curved path to simulate avoidance
            const pathCoords = [
                pathPoints.start,
                [midX + 3000, midY - 2000],
                [midX - 2000, midY + 3000],
                pathPoints.end
            ];
            
            const lineString = new ol.geom.LineString(pathCoords);
            const pathFeature = new ol.Feature({
                geometry: lineString,
                type: 'path'
            });
            
            analysisLayer.getSource().clear();
            analysisLayer.getSource().addFeature(pathFeature);
            
            // Style the path
            analysisLayer.setStyle(new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: '#10B981',
                    width: 4,
                    lineDash: [10, 5]
                })
            }));
            
            // Calculate mock distance
            const distance = ((Math.abs(pathPoints.start[0] - pathPoints.end[0]) + 
                              Math.abs(pathPoints.start[1] - pathPoints.end[1])) / 1000).toFixed(2);
            
            addResult({
                type: 'path',
                description: '逃生路径规划',
                distance: distance + ' km',
                waypoints: 4,
                timestamp: new Date().toLocaleTimeString('zh-CN')
            });
            
            addLog('路径规划', `距离：${distance}km`);
            showToast('路径计算完成');
        }
        
        // Reset path points
        function resetPathPoints() {
            pathPoints = { start: null, end: null };
            updatePathUI();
            tempLayer.getSource().clear();
        }
        
        // Clear all analysis
        function clearAnalysis() {
            analysisLayer.getSource().clear();
            tempLayer.getSource().clear();
            pathPoints = { start: null, end: null };
            updatePathUI();
            
            document.getElementById('resultsContent').innerHTML = `
                <div class="text-center text-gray-500 text-sm py-8">
                    暂无分析结果
                </div>
            `;
            
            analysisLayer.setStyle(new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(14, 165, 233, 0.4)' }),
                stroke: new ol.style.Stroke({ color: '#0EA5E9', width: 2 })
            }));
            
            showToast('已清除所有分析结果');
        }
        
        // Add result to panel
        function addResult(data) {
            const resultsContent = document.getElementById('resultsContent');
            const resultCard = document.createElement('div');
            resultCard.className = 'result-card bg-gray-800/50 rounded-lg p-3 border-l-4 ' + 
                (data.type === 'buffer' ? 'border-sky-500' : 
                 data.type === 'overlay' ? 'border-purple-500' : 'border-green-500');
            
            resultCard.innerHTML = `
                <div class="flex items-start justify-between mb-2">
                    <div class="font-medium text-sm">${data.description}</div>
                    <div class="text-xs text-gray-500">${data.timestamp}</div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    ${data.area ? `<div class="text-gray-400">面积：<span class="text-white">${data.area} km²</span></div>` : ''}
                    ${data.distance ? `<div class="text-gray-400">距离：<span class="text-white">${data.distance}</span></div>` : ''}
                    ${data.waypoints ? `<div class="text-gray-400">途经点：<span class="text-white">${data.waypoints}</span></div>` : ''}
                </div>
                <div class="mt-2 flex space-x-2">
                    <button class="px-2 py-1 bg-sky-600/50 hover:bg-sky-600 rounded text-xs cursor-pointer transition-colors duration-200" onclick="downloadGeoJSON()">
                        下载 GeoJSON
                    </button>
                    <button class="px-2 py-1 bg-gray-700/50 hover:bg-gray-700 rounded text-xs cursor-pointer transition-colors duration-200" onclick="copyToClipboard()">
                        复制数据
                    </button>
                </div>
            `;
            
            resultsContent.insertBefore(resultCard, resultsContent.firstChild);
        }
        
        // Download GeoJSON
        function downloadGeoJSON() {
            const features = analysisLayer.getSource().getFeatures();
            if (features.length === 0) {
                showToast('无分析结果可导出');
                return;
            }
            
            const geojson = new ol.format.GeoJSON().writeFeatures(features);
            const blob = new Blob([geojson], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'analysis_result_' + new Date().toISOString().slice(0, 10) + '.geojson';
            link.click();
            
            URL.revokeObjectURL(url);
            showToast('GeoJSON 已下载');
        }
        
        // Copy to clipboard
        function copyToClipboard() {
            const features = analysisLayer.getSource().getFeatures();
            if (features.length === 0) {
                showToast('无数据可复制');
                return;
            }
            
            const geojson = new ol.format.GeoJSON().writeFeatures(features);
            navigator.clipboard.writeText(geojson).then(() => {
                showToast('已复制到剪贴板');
            });
        }
        
        // Export analysis
        function exportAnalysis() {
            downloadGeoJSON();
        }
        
        // Add log entry
        function addLog(action, details) {
            const logs = JSON.parse(localStorage.getItem('analysisLogs') || '[]');
            logs.unshift({
                action: action,
                details: details,
                timestamp: new Date().toISOString()
            });
            
            // Keep only last 50 logs
            if (logs.length > 50) logs.splice(50);
            
            localStorage.setItem('analysisLogs', JSON.stringify(logs));
            loadLogs();
        }
        
        // Load logs
        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('analysisLogs') || '[]').slice(0, 5);
            const logList = document.getElementById('logList');
            
            if (logs.length === 0) {
                logList.innerHTML = '<div class="text-center text-gray-500 text-xs py-4">暂无日志记录</div>';
                return;
            }
            
            logList.innerHTML = logs.map(log => `
                <div class="text-xs p-2 bg-gray-800/30 rounded">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-300">${log.action}</span>
                        <span class="text-gray-500">${new Date(log.timestamp).toLocaleTimeString('zh-CN')}</span>
                    </div>
                    <div class="text-gray-400 mt-1">${log.details}</div>
                </div>
            `).join('');
        }
        
        // View all logs
        function viewLogs() {
            window.location.href = 'profile.html#logs';
        }
        
        // Show toast
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 glass-panel px-4 py-2 rounded-lg text-sm z-[3000]';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
