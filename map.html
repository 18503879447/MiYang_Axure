    <style>
        :root {
            --primary: #0F172A;
            --secondary: #334155;
            --cta: #0369A1;
            --background: #F8FAFC;
            --text: #020617;
            --accent: #0EA5E9;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
        }
        
        * {
            font-family: 'Lato', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'EB Garamond', serif;
        }
        
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .nav-link {
            position: relative;
            transition: color 0.2s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Full screen map */
        #map {
            width: 100%;
            height: calc(100vh - 64px);
            position: absolute;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        /* Map controls */
        .map-control-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 1000;
            width: 280px;
        }
        
        .layer-switcher {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 1000;
            width: 220px;
        }
        
        .search-box {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 400px;
        }
        
        .sensor-popup {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 12px;
            max-width: 300px;
            color: white;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 8px;
        }
        
        .control-btn {
            transition: all 0.2s ease;
        }
        
        .control-btn:hover {
            background: rgba(14, 165, 233, 0.2);
        }
        
        .control-btn.active {
            background: rgba(14, 165, 233, 0.3);
            border-color: var(--accent);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
        }
        
        /* OL overrides for dark theme */
        .ol-zoom button,
        .ol-rotate button,
        .ol-attribution button {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #fff !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
        
        .ol-zoom button:hover,
        .ol-rotate button:hover,
        .ol-attribution button:hover {
            background: rgba(14, 165, 233, 0.3) !important;
        }
        
        .ol-control {
            background: transparent !important;
        }
    </style>

<body class="text-gray-100" style="cursor: auto;">
    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-panel border-b border-gray-700/30 h-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
            <div class="flex items-center justify-between h-full">
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                    <span class="text-xl font-semibold" style="font-family: &#39;EB Garamond&#39;, serif;">绵阳市建筑风险监测系统</span>
                </div>
                
                <div class="flex items-center space-x-6">
                    <a href="index.html" class="nav-link text-gray-300 hover:text-white cursor-pointer">首页</a>
                    <a href="map.html" class="nav-link text-sky-400 font-medium" style="cursor: pointer;">一张图</a>
                    <a href="analysis.html" class="nav-link text-gray-300 hover:text-white cursor-pointer">风险研判</a>
                    <a href="data.html" class="nav-link text-gray-300 hover:text-white cursor-pointer">数据管理</a>
                    <a href="profile.html" class="nav-link text-gray-300 hover:text-white cursor-pointer">日志与中心</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button class="p-2 text-gray-400 hover:text-white cursor-pointer transition-colors duration-200" aria-label="全屏切换" onclick="toggleFullScreen()">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                        </svg>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center cursor-pointer">
                        <span class="text-sm font-medium">管</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Search Box -->
    <div class="search-box">
        <div class="glass-panel rounded-lg p-2 flex items-center space-x-2">
            <svg class="w-5 h-5 text-gray-400 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索地点、建筑、传感器..." class="flex-1 bg-transparent border-none outline-none text-white px-2 py-1 placeholder-gray-500">
            <button class="px-4 py-1.5 bg-sky-600 hover:bg-sky-500 rounded text-sm cursor-pointer transition-colors duration-200" onclick="searchLocation()">
                搜索
            </button>
        </div>
    </div>

    <!-- Layer Switcher -->
    <div class="layer-switcher glass-panel rounded-lg p-4">
        <h3 class="text-sm font-semibold mb-3 text-gray-300">图层控制</h3>
        <div class="space-y-2">
            <label class="flex items-center space-x-2 cursor-pointer control-btn p-2 rounded" onclick="toggleLayer(&#39;satellite&#39;)">
                <input type="checkbox" id="layerSatellite" checked="" class="w-4 h-4 text-sky-600 rounded focus:ring-sky-500">
                <span class="text-sm">卫星影像</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer control-btn p-2 rounded" onclick="toggleLayer(&#39;risk&#39;)">
                <input type="checkbox" id="layerRisk" checked="" class="w-4 h-4 text-sky-600 rounded focus:ring-sky-500">
                <span class="text-sm">风险等级</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer control-btn p-2 rounded" onclick="toggleLayer(&#39;sensors&#39;)">
                <input type="checkbox" id="layerSensors" checked="" class="w-4 h-4 text-sky-600 rounded focus:ring-sky-500">
                <span class="text-sm">传感器点位</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer control-btn p-2 rounded" onclick="toggleLayer(&#39;buildings&#39;)">
                <input type="checkbox" id="layerBuildings" class="w-4 h-4 text-sky-600 rounded focus:ring-sky-500">
                <span class="text-sm">建筑轮廓</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer control-btn p-2 rounded" onclick="toggleLayer(&#39;disasters&#39;)">
                <input type="checkbox" id="layerDisasters" class="w-4 h-4 text-sky-600 rounded focus:ring-sky-500">
                <span class="text-sm">历史灾害</span>
            </label>
        </div>
        
        <div class="mt-4 pt-4 border-t border-gray-700">
            <h3 class="text-sm font-semibold mb-3 text-gray-300">风险图例</h3>
            <div class="space-y-2">
                <div class="legend-item">
                    <div class="legend-color bg-green-500"></div>
                    <span class="text-xs text-gray-300">低风险</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color bg-yellow-500"></div>
                    <span class="text-xs text-gray-300">中风险</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color bg-orange-500"></div>
                    <span class="text-xs text-gray-300">较高风险</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color bg-red-500"></div>
                    <span class="text-xs text-gray-300">高风险</span>
                </div>
            </div>
        </div>
        
        <div class="mt-4 pt-4 border-t border-gray-700">
            <div class="text-xs text-gray-400">
                <div class="flex justify-between mb-1">
                    <span>监测点</span>
                    <span class="text-sky-400">3,254</span>
                </div>
                <div class="flex justify-between mb-1">
                    <span>在线率</span>
                    <span class="text-green-400">98.5%</span>
                </div>
                <div class="flex justify-between">
                    <span>最后更新</span>
                    <span id="lastUpdateTime">11:40:39</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Map Control Panel -->
    <div class="map-control-panel glass-panel rounded-lg p-4">
        <h3 class="text-sm font-semibold mb-3 text-gray-300">快速操作</h3>
        <div class="grid grid-cols-2 gap-2">
            <button class="control-btn p-2 rounded border border-gray-700 text-xs cursor-pointer" onclick="zoomToExtent()">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                刷新数据
            </button>
        </div>
        
        <div class="mt-4 pt-4 border-t border-gray-700">
            <h3 class="text-sm font-semibold mb-2 text-gray-300">测量工具</h3>
            <div class="grid grid-cols-3 gap-2">
                <button class="control-btn p-2 rounded border border-gray-700 text-xs cursor-pointer" title="距离测量">
                    <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                </button>
                <button class="control-btn p-2 rounded border border-gray-700 text-xs cursor-pointer" title="面积测量">
                    <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path>
                    </svg>
                </button>
                <button class="control-btn p-2 rounded border border-gray-700 text-xs cursor-pointer" title="标绘">
                    <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>

    <!-- Map Container -->
    <div id="map" style="cursor: auto;"><div class="ol-viewport" style="position: relative; overflow: hidden; width: 100%; height: 100%;"><div class="ol-unselectable ol-layers" style="position: absolute; width: 100%; height: 100%; z-index: 0;"><div class="ol-layer" style="position: absolute; width: 100%; height: 100%;"><canvas width="1872" height="970" style="position: absolute; left: 0px; transform-origin: left top; transform: matrix(1, 0, 0, 1, 0, 0); cursor: pointer;"></canvas></div></div><div class="ol-overlaycontainer" style="position: absolute; z-index: 0; width: 100%; height: 100%; pointer-events: none;"></div><div class="ol-overlaycontainer-stopevent" style="position: absolute; z-index: 0; width: 100%; height: 100%; pointer-events: none;"><div class="ol-zoom ol-unselectable ol-control" style="pointer-events: auto;"><button class="ol-zoom-in" type="button" title="Zoom in">+</button><button class="ol-zoom-out" type="button" title="Zoom out">–</button></div><div class="ol-attribution ol-unselectable ol-control ol-uncollapsible" style="pointer-events: auto;"><button type="button" aria-expanded="true" title="Attributions"><span class="ol-attribution-collapse">›</span></button><ul><li>© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors.</li></ul></div></div></div></div>

    <!-- Sensor Detail Modal -->
    <div id="sensorModal" class="fixed inset-0 bg-black/60 z-[2000] hidden items-center justify-center" onclick="closeSensorModal(event)">
        <div class="glass-panel rounded-lg p-6 w-full max-w-md mx-4" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold" style="font-family: &#39;EB Garamond&#39;, serif;">Insar数据集</h3>
                <button class="text-gray-400 hover:text-white cursor-pointer transition-colors duration-200" onclick="closeSensorModal()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div id="sensorContent">
                <!-- Content will be populated dynamically -->
            </div>
        </div>
    </div>

    <script>
        // Map instance
        let map;
        let layers = {};
        
        // Mianyang coordinates
        const MIANYANG_CENTER = ol.proj.fromLonLat([104.7468, 31.4677]);
        
        // Initialize map
        function initMap() {
            // Base layer (satellite imagery - using OSM as mock for GeoServer WMS)
            layers.satellite = new ol.layer.Tile({
                source: new ol.source.OSM({
                    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                }),
                visible: true
            });
            
            // Risk level layer (mock with vector layer)
            layers.risk = new ol.layer.Vector({
                source: new ol.source.Vector(),
                style: createRiskStyle(),
                visible: true
            });
            
            // Sensors layer
            layers.sensors = new ol.layer.Vector({
                source: new ol.source.Vector(),
                style: createSensorStyle(),
                visible: true
            });
            
            // Buildings layer
            layers.buildings = new ol.layer.Vector({
                source: new ol.source.Vector(),
                visible: false
            });
            
            // Disasters layer
            layers.disasters = new ol.layer.Vector({
                source: new ol.source.Vector(),
                visible: false
            });
            
            map = new ol.Map({
                target: 'map',
                layers: [
                    layers.satellite,
                    layers.risk,
                    layers.sensors,
                    layers.buildings,
                    layers.disasters
                ],
                view: new ol.View({
                    center: MIANYANG_CENTER,
                    zoom: 11,
                    minZoom: 8,
                    maxZoom: 18
                }),
                controls: ol.control.defaults.defaults({
                    zoom: true,
                    rotate: false,
                    attribution: true
                })
            });
            
            // Add click interaction for sensors
            map.on('click', function(evt) {
                const feature = map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                    return feature;
                });
                
                if (feature && feature.get('type') === 'sensor') {
                    showSensorDetail(feature);
                }
            });
            
            // Change cursor on hover
            map.on('pointermove', function(evt) {
                const feature = map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                    return feature;
                });
                
                if (feature && feature.get('type') === 'sensor') {
                    map.getTargetElement().style.cursor = 'pointer';
                } else {
                    map.getTargetElement().style.cursor = 'auto';
                }
            });
            
            // Populate mock data
            populateMockData();
            
            // Update time
            updateTime();
            setInterval(updateTime, 1000);
        }
        
        // Create risk level style
        function createRiskStyle() {
            return function(feature) {
                const riskLevel = feature.get('riskLevel');
                let color;
                
                switch(riskLevel) {
                    case 'high': color = 'rgba(239, 68, 68, 0.6)'; break;
                    case 'medium-high': color = 'rgba(249, 115, 22, 0.6)'; break;
                    case 'medium': color = 'rgba(245, 158, 11, 0.6)'; break;
                    case 'low': color = 'rgba(16, 185, 129, 0.6)'; break;
                    default: color = 'rgba(148, 163, 184, 0.6)';
                }
                
                return new ol.style.Style({
                    fill: new ol.style.Fill({ color: color }),
                    stroke: new ol.style.Stroke({
                        color: 'rgba(255, 255, 255, 0.8)',
                        width: 1
                    })
                });
            };
        }
        
        // Create sensor style
        function createSensorStyle() {
            return function(feature) {
                const status = feature.get('status');
                const color = status === 'online' ? '#10B981' : '#EF4444';
                
                return new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 8,
                        fill: new ol.style.Fill({ color: color }),
                        stroke: new ol.style.Stroke({
                            color: '#fff',
                            width: 2
                        })
                    })
                });
            };
        }
        
        // Populate mock data
        function populateMockData() {
            // Generate random risk zones
            const riskLevels = ['low', 'medium', 'medium-high', 'high'];
            for (let i = 0; i < 20; i++) {
                const coords = [
                    MIANYANG_CENTER[0] + (Math.random() - 0.5) * 50000,
                    MIANYANG_CENTER[1] + (Math.random() - 0.5) * 50000
                ];
                
                const polygon = createRandomPolygon(coords, 5000 + Math.random() * 10000);
                const feature = new ol.Feature({
                    geometry: new ol.geom.Polygon([polygon]),
                    riskLevel: riskLevels[Math.floor(Math.random() * riskLevels.length)],
                    type: 'risk-zone'
                });
                
                layers.risk.getSource().addFeature(feature);
            }
            
            // Generate sensor points
            for (let i = 0; i < 50; i++) {
                const coords = [
                    MIANYANG_CENTER[0] + (Math.random() - 0.5) * 40000,
                    MIANYANG_CENTER[1] + (Math.random() - 0.5) * 40000
                ];
                
                const feature = new ol.Feature({
                    geometry: new ol.geom.Point(coords),
                    type: 'sensor',
                    id: 'S' + String(i + 1).padStart(4, '0'),
                    name: '传感器 #' + (i + 1),
                    status: Math.random() > 0.1 ? 'online' : 'offline',
                    value: (Math.random() * 100).toFixed(2),
                    lastUpdate: new Date().toLocaleTimeString('zh-CN')
                });
                
                layers.sensors.getSource().addFeature(feature);
            }
        }
        
        // Create random polygon
        function createRandomPolygon(center, radius) {
            const points = [];
            const numPoints = 6 + Math.floor(Math.random() * 4);
            
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * 2 * Math.PI;
                const r = radius * (0.7 + Math.random() * 0.3);
                points.push([
                    center[0] + r * Math.cos(angle),
                    center[1] + r * Math.sin(angle)
                ]);
            }
            
            points.push(points[0]); // Close polygon
            return points;
        }
        
        // Show sensor detail
        function showSensorDetail(feature) {
            const content = document.getElementById('sensorContent');
            const data = feature.getProperties();
            
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-3 h-3 rounded-full ${data.status === 'online' ? 'bg-green-500' : 'bg-red-500'}"></div>
                        <span class="text-sm text-gray-300">${data.status === 'online' ? '在线' : '离线'}</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-800/50 rounded p-3">
                            <div class="text-xs text-gray-400 mb-1">传感器 ID</div>
                            <div class="font-mono text-sm">${data.id}</div>
                        </div>
                        <div class="bg-gray-800/50 rounded p-3">
                            <div class="text-xs text-gray-400 mb-1">读数</div>
                            <div class="text-lg font-bold text-sky-400">${data.value}</div>
                        </div>
                    </div>
                    
                    <div class="bg-gray-800/50 rounded p-3">
                        <div class="text-xs text-gray-400 mb-2">最近 7 天趋势</div>
                        <canvas id="sensorChart" height="150"></canvas>
                    </div>
                    
                    <div class="text-xs text-gray-400">
                        最后更新：${data.lastUpdate}
                    </div>
                    
                    <div class="flex space-x-2 pt-2">
                        <button class="flex-1 px-3 py-2 bg-sky-600 hover:bg-sky-500 rounded text-sm cursor-pointer transition-colors duration-200">
                            查看详情
                        </button>
                        <button class="flex-1 px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm cursor-pointer transition-colors duration-200">
                            历史记录
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('sensorModal').classList.remove('hidden');
            document.getElementById('sensorModal').classList.add('flex');
            
            // Initialize chart after DOM update
            setTimeout(() => {
                initSensorDetailChart();
            }, 100);
        }
        
        // Initialize sensor detail chart
        function initSensorDetailChart() {
            const canvas = document.getElementById('sensorChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 150);
            gradient.addColorStop(0, 'rgba(14, 165, 233, 0.3)');
            gradient.addColorStop(1, 'rgba(14, 165, 233, 0)');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                    datasets: [{
                        data: Array.from({length: 7}, () => 80 + Math.random() * 40),
                        borderColor: '#0EA5E9',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            grid: { color: 'rgba(148, 163, 184, 0.1)' },
                            ticks: { color: '#9CA3AF', font: { size: 10 } }
                        },
                        y: { 
                            grid: { color: 'rgba(148, 163, 184, 0.1)' },
                            ticks: { color: '#9CA3AF', font: { size: 10 } }
                        }
                    }
                }
            });
        }
        
        // Close sensor modal
        function closeSensorModal(event) {
            if (!event || event.target === document.getElementById('sensorModal')) {
                document.getElementById('sensorModal').classList.add('hidden');
                document.getElementById('sensorModal').classList.remove('flex');
            }
        }
        
        // Toggle layer visibility
        function toggleLayer(layerName) {
            if (layers[layerName]) {
                const isVisible = layers[layerName].getVisible();
                layers[layerName].setVisible(!isVisible);
            }
        }
        
        // Zoom to full extent
        function zoomToExtent() {
            map.getView().animate({
                center: MIANYANG_CENTER,
                zoom: 11,
                duration: 500
            });
        }
        
        // Center on high risk areas
        function centerOnRiskArea() {
            const features = layers.risk.getSource().getFeatures();
            const highRiskFeatures = features.filter(f => f.get('riskLevel') === 'high');
            
            if (highRiskFeatures.length > 0) {
                const extent = highRiskFeatures[0].getGeometry().getExtent();
                map.getView().fit(extent, {
                    duration: 500,
                    padding: [50, 50, 50, 50],
                    maxZoom: 14
                });
            }
        }
        
        // Export map image
        function exportMapImage() {
            map.once('postcompose', function(event) {
                const canvas = event.context.canvas;
                const dataURL = canvas.toDataURL('image/png');
                
                const link = document.createElement('a');
                link.download = '绵阳风险地图_' + new Date().toISOString().slice(0, 10) + '.png';
                link.href = dataURL;
                link.click();
            });
            map.renderSync();
        }
        
        // Refresh layers
        function refreshLayers() {
            // Simulate data refresh
            layers.sensors.getSource().clear();
            layers.risk.getSource().clear();
            populateMockData();
            
            // Show toast notification
            showToast('数据已刷新');
        }
        
        // Search location
        function searchLocation() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                // Mock search - in production would call GeoServer WFS
                showToast('搜索："'+ query +'" - 演示模式');
                
                // Random pan to simulate search result
                const randomOffset = [(Math.random() - 0.5) * 20000, (Math.random() - 0.5) * 20000];
                map.getView().animate({
                    center: [MIANYANG_CENTER[0] + randomOffset[0], MIANYANG_CENTER[1] + randomOffset[1]],
                    zoom: 13,
                    duration: 1000
                });
            }
        }
        
        // Toggle fullscreen
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        // Update time display
        function updateTime() {
            const now = new Date();
            document.getElementById('lastUpdateTime').textContent = now.toLocaleTimeString('zh-CN');
        }
        
        // Show toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 glass-panel px-4 py-2 rounded-lg text-sm z-[3000] animate-pulse';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
